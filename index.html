<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승현 ❤ 은정 결혼합니다</title>

<!-- 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  background:#fff;
  color:#111;
  line-height:1.6;
}

/* 커버 */
.cover {
  height:100vh;
  background:url('./images/숙소.jpg') center/cover no-repeat;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-shadow:0 2px 15px rgba(0,0,0,0.6);
}

.cover h1 {
  font-family:'Great Vibes', cursive;
  font-size:52px;
  margin-bottom:10px;
}

.cover p {
  font-size:16px;
  letter-spacing:1px;
}

/* 공통 */
.section {
  padding:70px 20px;
  text-align:center;
}

h2 {
  font-weight:400;
  margin-bottom:20px;
  letter-spacing:1px;
}

/* 버튼 */
.btn {
  display:inline-block;
  margin-top:20px;
  padding:12px 22px;
  background:#111;
  color:#fff;
  text-decoration:none;
  border-radius:30px;
  font-size:14px;
}

/* 갤러리 */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  padding:10px;
}

.grid img {
  width:100%;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.grid img:hover {
  opacity:0.8;
}

/* 모달 */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
  z-index:999;
}

.modal img {
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* 애니메이션 */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:all 1s ease;
}

.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- 커버 -->
<div class="cover">
  <h1>Seunghyun & Eunjung</h1>
  <p>2027.10.10</p>
  <p>서울</p>
</div>

<!-- 인사말 -->
<div class="section fade">
  <h2>INVITATION</h2>
  <p>
    서로 다른 길을 걸어온 저희가<br>
    이제 같은 길을 함께 걸어가려 합니다.<br><br>
    소중한 분들을 모시고<br>
    저희의 시작을 함께 나누고자 합니다.
  </p>
</div>

<!-- 안내 -->
<div class="section fade">
  <h2>WEDDING</h2>
  <p>2027년 10월 10일</p>
  <p>서울</p>
  <a class="btn" href="https://map.naver.com" target="_blank">지도 보기</a>
</div>

<!-- 갤러리 -->
<div class="section fade">
  <h2>GALLERY</h2>
  <div class="grid">
    <img src="./images/100일.jpg">
    <img src="./images/갈대.jpg">
    <img src="./images/눈.jpg">
    <img src="./images/따봉.jpg">
    <img src="./images/반지.jpg">
    <img src="./images/상하이.jpg">
    <img src="./images/소녀.jpg">
    <img src="./images/숙소.jpg">
    <img src="./images/약속.jpg">
    <img src="./images/첫만남.jpg">
    <img src="./images/패트.jpg">
    <img src="./images/화보.jpg">
  </div>
</div>

<!-- 연락 -->
<div class="section fade">
  <h2>CONTACT</h2>
  <a class="btn" href="tel:01012345678">신랑에게 연락</a>
  <a class="btn" href="tel:01087654321">신부에게 연락</a>
</div>

<!-- 모달 -->
<div class="modal" id="modal">
  <img id="modal-img">
</div>

<script>
/* 스크롤 애니메이션 */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

/* 이미지 확대 */
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");

document.querySelectorAll(".grid img").forEach(img => {
  img.addEventListener("click", () => {
    modal.style.display = "flex";
    modalImg.src = img.src;
  });
});

modal.addEventListener("click", () => {
  modal.style.display = "none";
});
</script>

</body>
</html>
