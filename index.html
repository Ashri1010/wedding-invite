<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승현 · 은정 결혼합니다</title>

<!-- 폰트 -->
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<!-- OG -->
<meta property="og:title" content="승현 · 은정 결혼합니다">
<meta property="og:description" content="2027년 10월 10일 | 서울">
<meta property="og:image" content="https://ashri1010.github.io/wedding-invite/images/숙소.jpg">
<meta property="og:url" content="https://ashri1010.github.io/wedding-invite/">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  line-height:1.7;
  color:#111;
}

/* 커버 */
.cover {
  height:100vh;
  background:url('./images/숙소.jpg') center/cover no-repeat;
  color:white;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-shadow:0 2px 15px rgba(0,0,0,0.6);
}

.cover h1 {
  font-family:'Nanum Myeongjo', serif;
  font-size:42px;
  letter-spacing:2px;
}

.section {
  padding:70px 20px;
  text-align:center;
}

h2 {
  font-family:'Nanum Myeongjo', serif;
  font-weight:400;
}

/* 버튼 */
.btn {
  display:inline-block;
  margin-top:15px;
  padding:10px 18px;
  background:#111;
  color:#fff;
  text-decoration:none;
  border-radius:25px;
  font-size:14px;
}

/* 갤러리 */
.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.grid img {
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

/* 모달 */
.modal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal img {
  max-width:90%;
}

/* 애니메이션 */
.fade {
  opacity:0;
  transform:translateY(30px);
  transition:1s;
}

.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- 커버 -->
<div class="cover">
  <h1>승현 · 은정</h1>
  <p>2027년 10월 10일</p>
  <p>서울</p>
</div>

<!-- 인사말 -->
<div class="section fade">
  <h2>초대합니다</h2>
  <p>
    서로 다른 길을 걸어온 저희가<br>
    이제 같은 길을 함께 걸어가려 합니다.<br><br>
    소중한 분들을 모시고<br>
    저희의 시작을 함께 나누고자 합니다.
  </p>
</div>

<!-- 예식 안내 -->
<div class="section fade">
  <h2>예식 안내</h2>
  <p>2027년 10월 10일</p>
  <p>서울</p>
</div>

<!-- 지도 -->
<div class="section fade">
  <h2>오시는 길</h2>
  <p>빌라드지디</p>
  <a class="btn" href="https://map.naver.com/p/search/%EB%B9%8C%EB%9D%BC%EB%93%9C%EC%A7%80%EB%94%94" target="_blank">
    네이버 지도 보기
  </a>
</div>

<!-- 갤러리 -->
<div class="section fade">
  <h2>갤러리</h2>
  <div class="grid">
    <img src="./images/100일.jpg">
    <img src="./images/갈대.jpg">
    <img src="./images/눈.jpg">
    <img src="./images/따봉.jpg">
    <img src="./images/반지.jpg">
    <img src="./images/상하이.jpg">
    <img src="./images/소녀.jpg">
    <img src="./images/숙소.jpg">
    <img src="./images/약속.jpg">
    <img src="./images/첫만남.jpg">
    <img src="./images/패트.jpg">
    <img src="./images/화보.jpg">
  </div>
</div>

<!-- 계좌 -->
<div class="section fade">
  <h2>마음 전하실 곳</h2>

  <p>신부</p>
  <p>기업은행 45007221201018</p>
  <button class="btn" onclick="copyText('기업은행 45007221201018')">계좌 복사</button>

  <br><br>

  <p>신랑</p>
  <p>케이뱅크 100140170055</p>
  <button class="btn" onclick="copyText('케이뱅크 100140170055')">계좌 복사</button>
</div>

<!-- 연락 -->
<div class="section fade">
  <h2>연락하기</h2>
  <a class="btn" href="tel:01012345678">신랑</a>
  <a class="btn" href="tel:01087654321">신부</a>
</div>

<!-- 모달 -->
<div class="modal" id="modal">
  <img id="modal-img">
</div>

<script>
/* 애니메이션 */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

/* 이미지 확대 */
const modal = document.getElementById("modal");
const modalImg = document.getElementById("modal-img");

document.querySelectorAll(".grid img").forEach(img => {
  img.onclick = () => {
    modal.style.display = "flex";
    modalImg.src = img.src;
  };
});

modal.onclick = () => modal.style.display = "none";

/* 복사 */
function copyText(text) {
  navigator.clipboard.writeText(text);
  alert("복사되었습니다");
}
</script>

</body>
</html>
