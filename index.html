<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승현 · 은정 결혼합니다</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">

<meta property="og:title" content="승현 · 은정 결혼합니다">
<meta property="og:description" content="2027년 10월 10일 | 서울">
<meta property="og:image" content="https://ashri1010.github.io/wedding-invite/images/숙소.jpg">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  color:#111;
  line-height:1.8;
}

/* 커버 */
.hero {
  position:relative;
  height:100vh;
  overflow:hidden;
}
.hero-bg {
  position:fixed;
  width:100%;
  height:100%;
  background:url('./images/숙소.jpg') center/cover;
  filter:brightness(0.6);
  z-index:-1;
}
.hero-text {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:#fff;
}
.hero-text h1 {
  font-family:'Nanum Myeongjo', serif;
  font-size:52px;
}

/* 섹션 */
.section {
  background:#fff;
  padding:100px 20px;
  text-align:center;
}
h2 {
  font-family:'Nanum Myeongjo', serif;
  margin-bottom:30px;
}

/* 버튼 */
.btn {
  display:inline-block;
  padding:12px 20px;
  background:#111;
  color:#fff;
  border-radius:30px;
  text-decoration:none;
  margin-top:20px;
}

/* 슬라이드 */
.slider {
  width:100%;
  max-width:500px;
  margin:0 auto;
  overflow:hidden;
}
.slides {
  display:flex;
  transition:transform 0.5s ease;
}
.slides img {
  width:100%;
  height:65vh;
  object-fit:cover;
  object-position:center;
  border-radius:12px;
}

/* 세로사진 대응 */
.slides img.portrait {
  object-fit:contain;
  background:#000;
}

/* 점 인디케이터 */
.dots {
  margin-top:15px;
}
.dots span {
  display:inline-block;
  width:6px;
  height:6px;
  margin:4px;
  background:#ccc;
  border-radius:50%;
  transition:0.3s;
}
.dots .active {
  background:#111;
  width:16px;
  border-radius:10px;
}

/* 계좌 */
.copy-btn {
  margin-top:10px;
  padding:8px 15px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:20px;
}

/* 애니메이션 */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- 커버 -->
<div class="hero">
  <div class="hero-bg"></div>
  <div class="hero-text">
    <h1>승현 · 은정</h1>
    <p>2027년 10월 10일</p>
    <p>서울</p>
  </div>
</div>

<!-- 인사 -->
<div class="section fade">
  <h2>초대합니다</h2>
  <p>
    서로 다른 길을 걸어온 저희가<br>
    이제 같은 길을 함께 걸어가려 합니다.<br><br>
    소중한 분들을 모시고<br>
    저희의 시작을 함께 나누고자 합니다.
  </p>
</div>

<!-- 안내 -->
<div class="section fade">
  <h2>예식 안내</h2>
  <p>2027년 10월 10일</p>
  <p>서울</p>
</div>

<!-- 지도 -->
<div class="section fade">
  <h2>오시는 길</h2>
  <p>빌라드지디</p>
  <a class="btn" href="https://map.naver.com/p/search/%EB%B9%8C%EB%9D%BC%EB%93%9C%EC%A7%80%EB%94%94" target="_blank">
    지도 보기
  </a>
</div>

<!-- 갤러리 -->
<div class="section fade">
  <h2>사진</h2>

  <div class="slider">
    <div class="slides" id="slides">
      <img src="./images/100일.jpg">
      <img src="./images/갈대.jpg">
      <img src="./images/눈.jpg">
      <img src="./images/따봉.jpg">
      <img src="./images/반지.jpg">
      <img src="./images/상하이.jpg">
      <img src="./images/소녀.jpg">
      <img src="./images/숙소.jpg">
      <img src="./images/약속.jpg">
      <img src="./images/첫만남.jpg">
      <img src="./images/패트.jpg">
      <img src="./images/화보.jpg">
    </div>
  </div>

  <div class="dots" id="dots"></div>
</div>

<!-- 계좌 -->
<div class="section fade">
  <h2>마음 전하실 곳</h2>

  <p>신부</p>
  <p>기업은행 45007221201018</p>
  <button class="copy-btn" onclick="copy('기업은행 45007221201018')">복사</button>

  <br><br>

  <p>신랑</p>
  <p>케이뱅크 100140170055</p>
  <button class="copy-btn" onclick="copy('케이뱅크 100140170055')">복사</button>
</div>

<!-- 연락 -->
<div class="section fade">
  <h2>연락하기</h2>
  <a class="btn" href="tel:01058735162">신랑 010-5873-5162</a>
  <a class="btn" href="tel:01053575034">신부 010-5357-5034</a>
</div>

<script>
/* 애니메이션 */
const fades = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  fades.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 50){
      el.classList.add('show');
    }
  });
});

/* 슬라이드 + dots */
const slides = document.getElementById("slides");
const total = slides.children.length;
const dotsContainer = document.getElementById("dots");

let index = 0;

/* dots 생성 */
for(let i=0;i<total;i++){
  const dot = document.createElement("span");
  if(i===0) dot.classList.add("active");
  dotsContainer.appendChild(dot);
}
const dots = dotsContainer.children;

function updateDots(){
  for(let i=0;i<dots.length;i++){
    dots[i].classList.remove("active");
  }
  dots[index].classList.add("active");
}

function moveSlide(){
  index = (index + 1) % total;
  slides.style.transform = `translateX(-${index * 100}%)`;
  updateDots();
}

setInterval(moveSlide, 2500);

/* 복사 */
function copy(text){
  navigator.clipboard.writeText(text);
  alert("복사되었습니다");
}
</script>

</body>
</html>
