<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승현 · 은정 결혼합니다</title>

<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">

<meta property="og:title" content="승현 · 은정 결혼합니다">
<meta property="og:description" content="2027년 10월 10일 | 서울">
<meta property="og:image" content="https://ashri1010.github.io/wedding-invite/images/숙소.jpg">

<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;line-height:1.8;color:#111}

/* 커버 */
.cover{
  position:relative;height:100vh;
  background:url('./images/숙소.jpg') center/cover no-repeat;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  color:#fff;text-align:center
}
.cover::before{content:'';position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.35)}
.cover *{position:relative}
.cover h1{font-family:'Nanum Myeongjo',serif;font-size:52px;letter-spacing:3px}
.cover p{font-size:14px}

/* 공통 */
.section{padding:100px 20px;text-align:center}
h2{font-family:'Nanum Myeongjo',serif;font-weight:400;margin-bottom:25px}

/* 버튼 */
.btn{
  display:inline-block;margin-top:12px;padding:10px 18px;
  background:#111;color:#fff;border-radius:25px;text-decoration:none;font-size:14px
}

/* 갤러리 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid img{width:100%;border-radius:12px;cursor:pointer}
.grid img:first-child{grid-column:span 2}

/* 모달 */
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:999}
.modal img{max-width:90%}

/* 계좌 접기 */
.account-box{margin-top:20px;border-top:1px solid #eee;padding-top:10px}
.account-header{cursor:pointer;font-weight:500;margin:10px 0}
.account-content{display:none}

/* 애니메이션 */
.fade{opacity:0;transform:translateY(40px);transition:1s}
.fade.show{opacity:1;transform:translateY(0)}
</style>
</head>

<body>

<!-- 커버 -->
<div class="cover">
  <h1>승현 · 은정</h1>
  <p>2027년 10월 10일</p>
  <p>서울</p>
</div>

<!-- 인사 -->
<div class="section fade">
  <h2>초대합니다</h2>
  <p>
    서로 다른 길을 걸어온 저희가<br>
    이제 같은 길을 함께 걸어가려 합니다.<br><br>
    소중한 분들을 모시고<br>
    저희의 시작을 함께 나누고자 합니다.
  </p>
</div>

<!-- 안내 -->
<div class="section fade">
  <h2>예식 안내</h2>
  <p>2027년 10월 10일</p>
  <p>서울</p>
</div>

<!-- 지도 -->
<div class="section fade">
  <h2>오시는 길</h2>
  <p>빌라드지디</p>
  <a class="btn" href="https://map.naver.com/p/search/%EB%B9%8C%EB%9D%BC%EB%93%9C%EC%A7%80%EB%94%94" target="_blank">지도 보기</a>
</div>

<!-- 갤러리 -->
<div class="section fade">
  <h2>사진</h2>
  <div class="grid">
    <img src="./images/100일.jpg">
    <img src="./images/갈대.jpg">
    <img src="./images/눈.jpg">
    <img src="./images/따봉.jpg">
    <img src="./images/반지.jpg">
    <img src="./images/상하이.jpg">
    <img src="./images/소녀.jpg">
    <img src="./images/숙소.jpg">
    <img src="./images/약속.jpg">
    <img src="./images/첫만남.jpg">
    <img src="./images/패트.jpg">
    <img src="./images/화보.jpg">
  </div>
</div>

<!-- 계좌 -->
<div class="section fade">
  <h2>마음 전하실 곳</h2>

  <div class="account-box">
    <div class="account-header" onclick="toggleAccount(0)">신부 계좌 ▼</div>
    <div class="account-content">
      기업은행 45007221201018<br>
      <button class="btn" onclick="copyText('기업은행 45007221201018')">복사</button>
    </div>
  </div>

  <div class="account-box">
    <div class="account-header" onclick="toggleAccount(1)">신랑 계좌 ▼</div>
    <div class="account-content">
      케이뱅크 100140170055<br>
      <button class="btn" onclick="copyText('케이뱅크 100140170055')">복사</button>
    </div>
  </div>
</div>

<!-- 연락 -->
<div class="section fade">
  <h2>연락하기</h2>
  <a class="btn" href="tel:01012345678">신랑</a>
  <a class="btn" href="tel:01087654321">신부</a>
</div>

<!-- 모달 -->
<div class="modal" id="modal">
  <img id="modal-img">
</div>

<script>
/* 애니메이션 */
const fades=document.querySelectorAll('.fade');
window.addEventListener('scroll',()=>{
  fades.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight-50){
      el.classList.add('show');
    }
  });
});

/* 갤러리 확대 + 슬라이드 */
const modal=document.getElementById("modal");
const modalImg=document.getElementById("modal-img");
const imgs=document.querySelectorAll(".grid img");
let current=0;

imgs.forEach((img,i)=>{
  img.onclick=()=>{
    modal.style.display="flex";
    modalImg.src=img.src;
    current=i;
  }
});

modal.onclick=()=>modal.style.display="none";

/* 계좌 토글 */
function toggleAccount(i){
  const list=document.querySelectorAll('.account-content');
  list[i].style.display = list[i].style.display==="block" ? "none" : "block";
}

/* 복사 */
function copyText(text){
  navigator.clipboard.writeText(text);
  alert("복사되었습니다");
}
</script>

</body>
</html>
