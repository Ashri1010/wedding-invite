<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>승현 · 은정 결혼합니다</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">

<meta property="og:title" content="승현 · 은정 결혼합니다">
<meta property="og:description" content="2027년 10월 10일 | 서울">
<meta property="og:image" content="https://ashri1010.github.io/wedding-invite/images/숙소.jpg">

<style>
body {
  margin:0;
  font-family:'Noto Sans KR', sans-serif;
  color:#111;
  line-height:1.8;
}

/* ===== 패럴럭스 ===== */
.hero {
  height:100vh;
  position:relative;
}
.hero-bg {
  position:fixed;
  width:100%;
  height:120%;
  background:url('./images/숙소.jpg') center/cover no-repeat;
  filter:brightness(0.6);
  z-index:-1;
}
.hero-text {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:#fff;
}
.hero-text h1 {
  font-family:'Noto Serif KR', serif;
  font-size:52px;
}

/* ===== 섹션 ===== */
.section {
  padding:100px 20px;
  text-align:center;
}
.section:nth-of-type(even) {
  background:#f8f6f3;
}

h2 {
  font-family:'Noto Serif KR', serif;
}

/* ===== 스크롤 ===== */
.fade {
  opacity:0;
  transform:translateY(40px);
  transition:1s;
}
.fade.show {
  opacity:1;
  transform:none;
}

/* ===== 버튼 ===== */
.btn {
  display:inline-block;
  padding:12px 20px;
  background:#111;
  color:#fff;
  border-radius:30px;
  text-decoration:none;
  margin-top:10px;
}

/* ===== 슬라이드 ===== */
.slider {
  max-width:500px;
  margin:auto;
  overflow:hidden;
}
.slides {
  display:flex;
  transition:0.7s cubic-bezier(0.22,1,0.36,1);
}
.slides img {
  width:100%;
  min-width:100%;
  height:65vh;
  object-fit:cover;
  flex-shrink:0;
  border-radius:12px;
}

/* dots */
.dots span {
  display:inline-block;
  width:6px;
  height:6px;
  background:#ccc;
  margin:4px;
  border-radius:50%;
}
.dots .active {
  background:#111;
  width:16px;
}

/* ===== 지도 ===== */
.map-img {
  width:100%;
  max-width:500px;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

/* ===== 캘린더 ===== */
.calendar-box {
  max-width:400px;
  margin:auto;
}
.calendar-header {
  font-family:'Noto Serif KR';
  font-size:30px;
  margin-bottom:20px;
}
.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:10px;
}
.calendar div {
  padding:10px;
}
.active-day {
  background:#000;
  color:#fff;
  border-radius:8px;
}

/* ===== 디데이 ===== */
.flip-clock {
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:20px;
}
.flip-unit {
  background:#111;
  color:#fff;
  padding:12px;
  border-radius:10px;
  min-width:60px;
}
.flip-unit span {
  font-size:26px;
  font-weight:bold;
}

/* ===== 계좌 ===== */
.account-header {
  cursor:pointer;
  margin-top:10px;
}
.account-content {
  display:none;
}
.copy-btn {
  margin-top:8px;
  padding:6px 12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- 커버 -->
<div class="hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-text">
    <h1>승현 · 은정</h1>
    <p>2027년 10월 10일</p>
    <p>서울</p>
  </div>
</div>

<!-- 인사 -->
<div class="section fade">
  <h2>초대합니다</h2>
  <p>저희 두 사람이 함께 새로운 시작을 합니다.</p>
</div>

<!-- 캘린더 -->
<div class="section fade">
  <h2>예식 일정</h2>
  <div class="calendar-box">
    <div class="calendar-header">
      2027.10.10<br>일요일 오후 4시
    </div>

    <div class="calendar">
      <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
      <div></div><div></div><div></div><div></div><div></div><div></div><div>1</div>
      <div>2</div><div>3</div><div>4</div><div>5</div><div>6</div><div>7</div><div>8</div>
      <div>9</div><div class="active-day">10</div><div>11</div><div>12</div><div>13</div><div>14</div><div>15</div>
    </div>
  </div>

  <!-- 디데이 -->
  <div class="flip-clock">
    <div class="flip-unit"><span id="d">00</span><p>일</p></div>
    <div class="flip-unit"><span id="h">00</span><p>시</p></div>
    <div class="flip-unit"><span id="m">00</span><p>분</p></div>
    <div class="flip-unit"><span id="s">00</span><p>초</p></div>
  </div>
</div>

<!-- 지도 -->
<div class="section fade">
  <h2>오시는 길</h2>
  <img src="./images/map.jpg" class="map-img">
  <br>
  <a class="btn" href="https://map.naver.com">네이버 지도</a>
</div>

<!-- 사진 -->
<div class="section fade">
  <h2>사진</h2>
  <div class="slider">
    <div class="slides" id="slides">
      <img src="./images/숙소.jpg">
      <img src="./images/반지.jpg">
      <img src="./images/눈.jpg">
    </div>
  </div>
  <div class="dots" id="dots"></div>
</div>

<!-- 계좌 -->
<div class="section fade">
  <h2>마음 전하실 곳</h2>

  <div class="account-header" onclick="toggle(0)">신부 ▼</div>
  <div class="account-content">
    기업은행 45007221201018
    <br><button class="copy-btn" onclick="copy('45007221201018')">복사</button>
  </div>

  <div class="account-header" onclick="toggle(1)">신랑 ▼</div>
  <div class="account-content">
    케이뱅크 100140170055
    <br><button class="copy-btn" onclick="copy('100140170055')">복사</button>
  </div>
</div>

<script>
/* 패럴럭스 */
window.addEventListener("scroll",()=>{
  document.getElementById("hero-bg").style.transform=
    `translateY(${window.scrollY*0.3}px)`;
});

/* 스크롤 */
const fades=document.querySelectorAll('.fade');
window.addEventListener("scroll",()=>{
  fades.forEach(el=>{
    if(el.getBoundingClientRect().top<window.innerHeight-80){
      el.classList.add("show");
    }
  });
});

/* 슬라이드 */
let idx=0;
const slides=document.getElementById("slides");
const dots=document.getElementById("dots");

for(let i=0;i<slides.children.length;i++){
  const d=document.createElement("span");
  if(i===0)d.classList.add("active");
  dots.appendChild(d);
}

slides.addEventListener("touchend",()=>{
  idx=(idx+1)%slides.children.length;
  slides.style.transform=`translateX(-${idx*100}%)`;
  dots.children[idx].classList.add("active");
});

/* 디데이 */
setInterval(()=>{
  const t=new Date("2027-10-10T16:00:00")-new Date();
  document.getElementById("d").innerText=Math.floor(t/86400000);
  document.getElementById("h").innerText=Math.floor(t/3600000)%24;
  document.getElementById("m").innerText=Math.floor(t/60000)%60;
  document.getElementById("s").innerText=Math.floor(t/1000)%60;
},1000);

/* 계좌 */
function toggle(i){
  const c=document.querySelectorAll('.account-content');
  c[i].style.display=c[i].style.display==='block'?'none':'block';
}

/* 복사 */
function copy(t){
  navigator.clipboard.writeText(t);
  alert("복사됨");
}
</script>

</body>
</html>
